# Cloud Build configuration for HSS Frontend
# Trigger: develop branch → Firebase Hosting (staging)
# Connects to: hss-backend-dev

steps:
  # 1) Install dependencies
  - name: 'gcr.io/cloud-builders/npm'
    id: 'install'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        echo "📦 Dependencies yükleniyor..."
        pwd
        ls -la
        if [ -d "HSS" ]; then
          cd HSS
        fi
        npm ci --prefer-offline --no-audit
        echo "✅ Dependencies hazır!"

  # 2) Build
  - name: 'gcr.io/cloud-builders/npm'
    id: 'build'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        echo "🔨 Frontend build..."
        echo "Backend URL: ${_BACKEND_URL}"
        echo "Firebase Project: ${_FIREBASE_PROJECT}"
        pwd
        if [ -d "HSS" ]; then
          cd HSS
        fi
        
        # Create .env.production with all required environment variables
        {
          echo "REACT_APP_API_URL=${_BACKEND_URL}"
          echo "REACT_APP_FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT}"
          if [ -n "${_FIREBASE_API_KEY:-}" ]; then
            echo "REACT_APP_FIREBASE_API_KEY=${_FIREBASE_API_KEY}"
          fi
          if [ -n "${_FIREBASE_AUTH_DOMAIN:-}" ]; then
            echo "REACT_APP_FIREBASE_AUTH_DOMAIN=${_FIREBASE_AUTH_DOMAIN}"
          else
            echo "REACT_APP_FIREBASE_AUTH_DOMAIN=${_FIREBASE_PROJECT}.web.app"
          fi
          if [ -n "${_FIREBASE_STORAGE_BUCKET:-}" ]; then
            echo "REACT_APP_FIREBASE_STORAGE_BUCKET=${_FIREBASE_STORAGE_BUCKET}"
          else
            echo "REACT_APP_FIREBASE_STORAGE_BUCKET=${_FIREBASE_PROJECT}.appspot.com"
          fi
        } > .env.production
        
        echo "📋 Environment variables:"
        cat .env.production | sed 's/\(API_KEY\)=.*/\1=***HIDDEN***/' || true
        
        npm run build
        echo "✅ Build tamamlandı!"

  # 3) Deploy (staging channel)
  # Note: Firebase CLI is installed in this step via npm

  # 4) Deploy (staging vs production)
  - name: 'node:20-alpine'
    id: 'deploy'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        set -euo pipefail
        echo "🚀 Firebase Hosting deploy..."
        echo "Project: ${_FIREBASE_PROJECT}"
        echo "Environment: ${_ENVIRONMENT}"

        # Install firebase-tools
        echo "🔥 Firebase CLI yükleniyor..."
        npm install -g firebase-tools@latest

        # Change to HSS directory if exists
        pwd
        ls -la
        if [ -d "HSS" ]; then
          cd HSS
        fi

        # Check firebase.json exists
        echo "📁 Firebase config kontrolü..."
        ls -la firebase.json
        cat firebase.json

        # Conditional deploy
        if [ "${_ENVIRONMENT}" = "production" ]; then
          echo "📤 Production deploy (hosting:deploy)"
          firebase hosting:deploy \
            --project ${_FIREBASE_PROJECT} \
            --site ${_HOSTING_SITE} \
            --non-interactive \
            --only hosting
        else
          echo "📤 Staging channel deploy (channel:deploy staging)"
          # Note: channel:deploy does not support --site or --only parameters
          firebase hosting:channel:deploy staging \
            --project ${_FIREBASE_PROJECT} \
            --non-interactive
        fi

        echo "✅ Deploy başarılı!"

  # 5) Logging
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'monitoring'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        echo "📊 Deployment logu gönderiliyor..."
        
        # Create JSON payload file using echo to avoid YAML parsing issues
        echo '{' > /tmp/deployment-payload.json
        echo '  "service": "hss-frontend",' >> /tmp/deployment-payload.json
        echo "  \"environment\": \"${_ENVIRONMENT}\"," >> /tmp/deployment-payload.json
        echo "  \"commit_sha\": \"${SHORT_SHA}\"," >> /tmp/deployment-payload.json
        echo "  \"backend_url\": \"${_BACKEND_URL}\"," >> /tmp/deployment-payload.json
        echo "  \"deployment_time\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"" >> /tmp/deployment-payload.json
        echo '}' >> /tmp/deployment-payload.json
        
        gcloud logging write hss-frontend-deployment \
          "Frontend deployment completed successfully" \
          --severity=INFO \
          --payload-type=json \
          --payload-file=/tmp/deployment-payload.json || echo "⚠️ Monitoring gönderilemedi"

# Substitutions
substitutions:
  _BACKEND_URL: 'https://hss-backend-dev-296268886725.europe-west3.run.app'
  _FIREBASE_PROJECT: 'hss-cloud-473511'
  _ENVIRONMENT: 'staging'  # staging | production
  _MACHINE_TYPE: 'E2_HIGHCPU_8'
  _HOSTING_SITE: 'hss-cloud-473511'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8   # << düzeltildi (enum)
  diskSizeGb: 50
  substitution_option: 'ALLOW_LOOSE'

timeout: '1200s'
