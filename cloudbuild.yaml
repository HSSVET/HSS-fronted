# Cloud Build configuration for HSS Frontend
# Trigger: develop branch → Firebase Hosting (hssvet.com staging)
# Connects to: hss-backend-dev

steps:
  # 1. Install dependencies with caching
  - name: 'gcr.io/cloud-builders/npm'
    id: 'install'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "📦 Dependencies yükleniyor..."
        cd HSS
        npm ci --prefer-offline --no-audit
        echo "✅ Dependencies hazır!"

  # 2. Build React app with environment variables
  - name: 'gcr.io/cloud-builders/npm'
    id: 'build'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        cd HSS
        
        echo "🔨 Frontend build başlıyor..."
        echo "Backend URL: ${_BACKEND_URL}"
        
        # Create .env file with backend URL based on environment
        ENV_FILE=".env.${_ENVIRONMENT}"
        echo "REACT_APP_API_URL=${_BACKEND_URL}" > ${ENV_FILE}
        cat ${ENV_FILE}
        
        npm run build
        
        echo "✅ Build tamamlandı!"

  # 3. Install Firebase tools
  - name: 'gcr.io/cloud-builders/npm'
    id: 'firebase-tools'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "🔥 Firebase tools yükleniyor..."
        npm install -g firebase-tools
        echo "✅ Firebase tools hazır!"

  # 4. Deploy to Firebase Hosting Staging Channel
  - name: 'gcr.io/cloud-builders/npm'
    id: 'deploy'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        
        echo "🚀 Firebase Hosting (staging channel) deploy başlıyor..."
        echo "Project: ${_FIREBASE_PROJECT}"
        
        cd HSS
        
        # Firebase CLI Cloud Build service account'ı kullanır
        # Staging channel'a deploy ediyoruz (production değil)
        # Staging channel'a deploy ediyoruz (staging.hssvet.com domain'i otomatik bağlanır)
        firebase hosting:channel:deploy staging \
          --project ${_FIREBASE_PROJECT} \
          --only hosting:staging \
          --non-interactive
        
        echo "✅ Deploy başarılı!"
        echo "🌐 Staging geçici URL oluşturuldu"
        echo "📝 Kalıcı domain (staging.hssvet.com) DNS propagation sonrası aktif olacak"
        echo "🔗 Firebase Console → Hosting → Channels'dan geçici URL'i görebilirsiniz"

  # 5. Logging
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'monitoring'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "📊 Deployment logu gönderiliyor..."
        gcloud logging write hss-frontend-deployment \
          "Frontend deployment completed successfully" \
          --severity=INFO \
          --payload-type=json \
          --payload='{
            "service": "hss-frontend",
            "environment": "${_ENVIRONMENT}",
            "commit_sha": "${SHORT_SHA}",
            "backend_url": "${_BACKEND_URL}",
            "deployment_time": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
          }' || echo "⚠️ Monitoring gönderilemedi"

# Substitution variables (set in trigger configuration)
substitutions:
  _BACKEND_URL: 'https://hss-backend-dev-296268886725.europe-west3.run.app'
  _FIREBASE_PROJECT: 'hss-cloud-473511'
  _ENVIRONMENT: 'staging'  # staging veya production

# Options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'e2-highcpu-8'  # 8 vCPU, 8GB RAM - sufficient for npm build
  diskSizeGb: 50
  substitution_option: 'ALLOW_LOOSE'

timeout: '1200s'

