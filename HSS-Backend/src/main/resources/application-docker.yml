# Docker-specific application configuration

spring:
  # --- VERİTABANI BAĞLANTISI ---
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/vetdb}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}

  # --- JPA & HIBERNATE ---
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  # --- FLYWAY VERİTABANI MIGRATION ---
  flyway:
    enabled: false

  # --- SECURITY & OAUTH2 ---
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: ${KEYCLOAK_CLIENT_ID:hss-backend}
            client-secret: ${KEYCLOAK_CLIENT_SECRET:hss-backend-secret-2024}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - profile
              - email
        provider:
          keycloak:
            authorization-uri: ${KEYCLOAK_AUTH_SERVER_URL:http://keycloak:8080}/realms/${KEYCLOAK_REALM:veterinary-clinic}/protocol/openid-connect/auth
            token-uri: ${KEYCLOAK_AUTH_SERVER_URL:http://keycloak:8080}/realms/${KEYCLOAK_REALM:veterinary-clinic}/protocol/openid-connect/token
            user-info-uri: ${KEYCLOAK_AUTH_SERVER_URL:http://keycloak:8080}/realms/${KEYCLOAK_REALM:veterinary-clinic}/protocol/openid-connect/userinfo
            jwk-set-uri: ${KEYCLOAK_AUTH_SERVER_URL:http://keycloak:8080}/realms/${KEYCLOAK_REALM:veterinary-clinic}/protocol/openid-connect/certs
            user-name-attribute: preferred_username
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_AUTH_SERVER_URL:http://keycloak:8080}/realms/${KEYCLOAK_REALM:veterinary-clinic}
          jwk-set-uri: ${KEYCLOAK_AUTH_SERVER_URL:http://keycloak:8080}/realms/${KEYCLOAK_REALM:veterinary-clinic}/protocol/openid-connect/certs

# --- HSS UYGULAMASI YAPıLANDıRMASı ---
hss:
  keycloak:
    server-url: ${KEYCLOAK_AUTH_SERVER_URL:http://keycloak:8080}
    realm: ${KEYCLOAK_REALM:veterinary-clinic}
    client-id: ${KEYCLOAK_CLIENT_ID:hss-backend}
    client-secret: ${KEYCLOAK_CLIENT_SECRET:hss-backend-secret-2024}
    admin:
      username: admin
      password: admin123
      client-id: admin-cli
  sync:
    enabled: true
    full-sync-interval: 1800000  # 30 dakika
    removed-check-interval: 3600000  # 1 saat
    stats-log-interval: 300000  # 5 dakika
  
  # --- MİNİO OBJECT STORAGE YAPıLANDıRMASı ---
  storage:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://minio:9000}
      access-key: ${MINIO_ACCESS_KEY:admin}
      secret-key: ${MINIO_SECRET_KEY:admin123456}
      buckets:
        documents: hss-documents
        images: hss-images
        medical-records: hss-medical-records
        reports: hss-reports
      max-file-size: 10MB
  
  # MinIO test modu - problemli servisleri devre dışı bırakır
  minio:
    test-mode: true
    
# --- SERVER YAPıLANDıRMASı ---
server:
  port: 8090

# --- LOGLAMA YAPıLANDıRMASı ---
logging:
  level:
    org.springframework.security: INFO
    org.springframework.web: INFO
    com.vetverse.hss: INFO 